/joint_trajectory_controller:
  ros__parameters:
    joints:
      - left_hip_pitch_joint
      - left_hip_roll_joint
      - left_hip_yaw_joint
      - left_knee_joint
      - left_ankle_pitch_joint
      - left_ankle_roll_joint
      - right_hip_pitch_joint
      - right_hip_roll_joint
      - right_hip_yaw_joint
      - right_knee_joint
      - right_ankle_pitch_joint
      - right_ankle_roll_joint
      - waist_yaw_joint
      - waist_roll_joint
      - waist_pitch_joint
      - left_shoulder_pitch_joint
      - left_shoulder_roll_joint
      - left_shoulder_yaw_joint
      - left_elbow_joint
      - left_wrist_roll_joint
      - left_wrist_pitch_joint
      - left_wrist_yaw_joint
      - right_shoulder_pitch_joint
      - right_shoulder_roll_joint
      - right_shoulder_yaw_joint
      - right_elbow_joint
      - right_wrist_roll_joint
      - right_wrist_pitch_joint
      - right_wrist_yaw_joint
      - left_eccentric_joint
      - right_eccentric_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 0.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    open_loop_control: false
    constraints:
      goal_time: 2.0
      stopped_velocity_tolerance: 0.05
      left_hip_pitch_joint: {goal: 0.05}
      left_hip_roll_joint: {goal: 0.05}
      left_hip_yaw_joint: {goal: 0.05}
      left_knee_joint: {goal: 0.05}
      left_ankle_pitch_joint: {goal: 0.05}
      left_ankle_roll_joint: {goal: 0.05}
      right_hip_pitch_joint: {goal: 0.05}
      right_hip_roll_joint: {goal: 0.05}
      right_hip_yaw_joint: {goal: 0.05}
      right_knee_joint: {goal: 0.05}
      right_ankle_pitch_joint: {goal: 0.05}
      right_ankle_roll_joint: {goal: 0.05}
      waist_yaw_joint: {goal: 0.05}
      waist_roll_joint: {goal: 0.05}
      waist_pitch_joint: {goal: 0.05}
      left_shoulder_pitch_joint: {goal: 0.05}
      left_shoulder_roll_joint: {goal: 0.05}
      left_shoulder_yaw_joint: {goal: 0.05}
      left_elbow_joint: {goal: 0.05}
      left_wrist_roll_joint: {goal: 0.05}
      left_wrist_pitch_joint: {goal: 0.05}
      left_wrist_yaw_joint: {goal: 0.05}
      right_shoulder_pitch_joint: {goal: 0.05}
      right_shoulder_roll_joint: {goal: 0.05}
      right_shoulder_yaw_joint: {goal: 0.05}
      right_elbow_joint: {goal: 0.05}
      right_wrist_roll_joint: {goal: 0.05}
      right_wrist_pitch_joint: {goal: 0.05}
      right_wrist_yaw_joint: {goal: 0.05}
      left_eccentric_joint: {goal: 0.05}
      right_eccentric_joint: {goal: 0.05}